<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B5JY1W0EZD"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-B5JY1W0EZD');
  </script>
  <title>로또 추첨기</title>
  <style>
    :root {
      --primary: #0070d1;
      --primary-pressed: #0064b7;
      --primary-active: #004d8d;
      --commerce: #d53b00;
      --ink: #000000;
      --ink-deep: #121314;
      --surface-dark: #181818;
      --surface-dark-elevated: #121314;
      --surface-blue: #0070d1;
      --surface-white: #ffffff;
      --surface-soft: #f3f3f3;
      --surface-card: #f5f7fa;
      --hairline-light: #e5e5e5;
      --hairline-dark: rgba(255, 255, 255, 0.16);
      --body-light: rgba(0, 0, 0, 0.6);
      --body-dark: rgba(255, 255, 255, 0.7);
      --mute-light: #6b6b6b;
      --mute-dark: rgba(255, 255, 255, 0.55);
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-full: 9999px;
      --shadow-soft: none;
      --ball-size: 64px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      background: #000000;
      color: #ffffff;
      font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
      letter-spacing: 0.1px;
    }

    .app {
      width: min(1280px, 100%);
      margin: 0 auto;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr;
      background: #000000;
    }

    .sidebar {
      padding: 18px 24px 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px 24px;
      background: #000000;
      color: #ffffff;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 260px;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary);
      color: #ffffff;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.02em;
      flex: 0 0 auto;
    }

    .brand-title {
      margin: 0;
      font-size: 1.13rem;
      line-height: 1.25;
      font-weight: 300;
      letter-spacing: 0;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 8px 16px;
      border-radius: 9999px;
      background: transparent;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.88rem;
      font-weight: 400;
      border: 1px solid transparent;
    }

    .nav-item.active {
      color: #ffffff;
      font-weight: 700;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .nav-dot {
      display: none;
    }

    .content {
      display: grid;
      gap: 64px;
      background: #000000;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 0;
    }

    .dark-band {
      background: #000000;
      color: #ffffff;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .light-band {
      background: #ffffff;
      color: #000000;
      border-bottom: 1px solid #f3f3f3;
    }

    .blue-band {
      background: var(--primary);
      color: #ffffff;
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
    }

    .hero-card,
    .draw-card,
    .history-card {
      border-radius: 0;
    }

    .hero-card {
      padding: 64px 32px;
    }

    .hero-card h1 {
      margin: 0 0 12px;
      max-width: 18ch;
      font-family: "Roboto", "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: clamp(2.25rem, 4vw, 3.75rem);
      line-height: 1.25;
      font-weight: 300;
      letter-spacing: -0.1px;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 0.875rem;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: 0.324px;
      box-shadow: none;
      border: 1px solid transparent;
    }

    .pill.muted {
      color: rgba(255, 255, 255, 0.7);
      font-weight: 400;
    }

    .light-band .pill {
      background: #1f1f1f;
      color: #ffffff;
    }

    .light-band .pill.muted {
      color: #b3b3b3;
    }

    .blue-band .pill {
      background: rgba(255, 255, 255, 0.16);
      color: #ffffff;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .stat {
      background: #181818;
      border-radius: 8px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .stat .label {
      display: block;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.875rem;
      letter-spacing: 0;
      text-transform: none;
      font-weight: 400;
    }

    .stat .value {
      font-size: 1.125rem;
      font-weight: 700;
      color: #ffffff;
    }

    .draw-card {
      padding: 64px 32px;
    }

    .draw-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .draw-head h2,
    .history-head h3 {
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.25;
      font-weight: 300;
      color: inherit;
    }

    .divider {
      height: 1px;
      background: currentColor;
      opacity: 0.08;
    }

    .result {
      min-height: 140px;
      border-radius: 8px;
      background: #ffffff;
      border: 1px solid #e5e5e5;
      display: grid;
      place-items: center;
      padding: 16px;
      box-shadow: none;
    }

    .balls {
      display: flex;
      flex-wrap: nowrap;
      justify-content: center;
      gap: 8px;
      width: 100%;
      overflow-x: auto;
    }

    .ball {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #ffffff;
      border: 1px solid #d9d9d9;
      color: #000000;
      font-size: 1.2rem;
      font-weight: 700;
      box-shadow: none;
      animation: pop 220ms ease both;
    }

    .bonus {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px 14px;
      border-radius: 9999px;
      background: rgba(0, 112, 209, 0.12);
      color: var(--primary);
      font-size: 0.875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      width: fit-content;
    }

    .bonus-value {
      display: inline-grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--primary);
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: none;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .round-input {
      min-width: 140px;
      flex: 1 1 180px;
      border: 1px solid #d9d9d9;
      border-radius: 9999px;
      background: #ffffff;
      color: #000000;
      padding: 12px 16px;
      font: inherit;
      box-shadow: none;
    }

    .round-input::placeholder {
      color: #6b6b6b;
      opacity: 1;
    }

    .round-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 1px rgba(0, 112, 209, 0.18);
    }

    button {
      appearance: none;
      border: 0;
      cursor: pointer;
      font-family: inherit;
      transition: none;
    }

    .btn {
      border-radius: 9999px;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: 0.45px;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--primary);
      color: #ffffff;
    }

    .btn-secondary {
      background: transparent;
      color: #000000;
      border-color: #7c7c7c;
    }

    .dark-band .btn-secondary,
    .blue-band .btn-secondary {
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.45);
    }

    .blue-band .btn-primary,
    .dark-band .btn-primary {
      background: var(--primary);
      color: #ffffff;
    }

    .history-card {
      padding: 32px 24px;
    }

    .history-card.dark-band,
    .history-card.blue-band {
      padding: 64px 32px;
    }

    .history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
    }

    .history-card .pill.muted {
      background: transparent;
      color: inherit;
      border: 1px solid currentColor;
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid currentColor;
      opacity: 0.92;
    }

    .dark-band .history-item,
    .blue-band .history-item {
      border-bottom-color: rgba(255, 255, 255, 0.16);
    }

    .light-band .history-item {
      border-bottom-color: #f3f3f3;
    }

    .history-item strong {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .history-item small {
      color: inherit;
      opacity: 0.7;
      font-size: 0.875rem;
    }

    .history-balls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .mini-ball {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #000000;
      font-size: 0.75rem;
      font-weight: 700;
      border: 1px solid #d9d9d9;
    }

    .bonus-chip {
      background: #ffffff;
      color: var(--primary);
    }

    .empty {
      color: inherit;
      opacity: 0.7;
      text-align: center;
      padding: 12px 0;
      line-height: 1.5;
    }

    .empty.strong {
      opacity: 1;
      font-weight: 700;
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: scale(0.65);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 1024px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .hero-card,
      .draw-card,
      .history-card.dark-band,
      .history-card.blue-band {
        padding: 48px 24px;
      }
    }

    @media (max-width: 640px) {
      .sidebar {
        padding: 16px 18px;
        align-items: flex-start;
      }

      .brand {
        min-width: 0;
        width: 100%;
      }

      .nav {
        width: 100%;
      }

      .content {
        gap: 48px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .controls {
        flex-direction: column;
      }

      .btn,
      .round-input {
        width: 100%;
      }

      .hero-card,
      .draw-card,
      .history-card.dark-band,
      .history-card.blue-band {
        padding: 32px 16px;
      }

      .hero-card h1 {
        font-size: clamp(1.8rem, 8vw, 2.6rem);
      }

      .ball {
        flex: 0 0 48px;
        width: 48px;
        height: 48px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">P</div>
        <h2 class="brand-title">PlayStation Lotto</h2>
      </div>

      <nav class="nav" aria-label="로또 추첨 메뉴">
        <div class="nav-item active"><span class="nav-dot"></span> 추첨기</div>
        <div class="nav-item"><span class="nav-dot"></span> 최근 기록</div>
        <div class="nav-item"><span class="nav-dot"></span> 번호 규칙</div>
      </nav>

    </aside>

    <section class="content">
      <section class="hero">
        <article class="hero-card dark-band">
          <div>
            <h1>Pick your lucky lotto numbers</h1>
          </div>

          <div class="stats">
            <div class="stat">
              <span class="label">Mode</span>
              <span class="value">자동 추첨</span>
            </div>
            <div class="stat">
              <span class="label">Main</span>
              <span class="value">6개</span>
            </div>
            <div class="stat">
              <span class="label">Bonus</span>
              <span class="value">1개</span>
            </div>
          </div>
        </article>

        <article class="draw-card light-band">
          <div class="draw-head">
            <h2>추첨 결과</h2>
            <span class="pill">1 - 45</span>
          </div>
          <div class="divider"></div>
          <div class="result" aria-live="polite">
            <div id="result" class="balls">
              <div class="empty strong">번호를 추첨하려면 버튼을 눌러주세요</div>
            </div>
          </div>
          <div class="controls">
            <button id="drawBtn" class="btn btn-primary">추첨 시작</button>
            <button id="clearBtn" class="btn btn-secondary">기록 초기화</button>
          </div>
          <div class="bonus" id="bonusInfo" hidden>
            bonus
            <span id="bonusValue" class="bonus-value"></span>
          </div>
        </article>
      </section>

      <section class="history-card dark-band">
        <div class="history-head">
          <h3>최근 추첨 기록</h3>
        </div>
        <div id="history" class="history-list">
          <div class="empty">아직 추첨 기록이 없습니다.</div>
        </div>
      </section>

      <section class="history-card blue-band">
        <div class="history-head">
          <h3>역대 당첨번호</h3>
        </div>
        <div class="controls">
          <input id="roundInput" class="round-input" type="number" min="1" placeholder="회차 검색" />
          <button id="roundSearchBtn" class="btn btn-secondary">검색</button>
          <button id="latestBtn" class="btn btn-secondary">최신 20개</button>
          <button id="moreBtn" class="btn btn-primary">더 보기</button>
        </div>
        <div id="officialHistory" class="history-list">
          <div class="empty">역대 당첨번호를 불러오는 중입니다.</div>
        </div>
      </section>
    </section>
  </main>

  <script src="./lotto-history-data.js"></script>
  <script type="module">
    let createClient = null;
    try {
      ({ createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'));
    } catch (error) {
      console.warn("Supabase client failed to load. The app will fall back to local storage.", error);
    }

    const drawBtn = document.getElementById("drawBtn");
    const clearBtn = document.getElementById("clearBtn");
    const result = document.getElementById("result");
    const history = document.getElementById("history");
    const bonusInfo = document.getElementById("bonusInfo");
    const bonusValue = document.getElementById("bonusValue");
    const officialHistory = document.getElementById("officialHistory");
    const roundInput = document.getElementById("roundInput");
    const roundSearchBtn = document.getElementById("roundSearchBtn");
    const latestBtn = document.getElementById("latestBtn");
    const moreBtn = document.getElementById("moreBtn");

    const SUPABASE_URL = "https://whambvatiexwtrttxefo.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndoYW1idmF0aWV4d3RydHR4ZWZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTU4NzcsImV4cCI6MjA5ODk3MTg3N30.Xly3MRP6IoxnDBhu9rCQhU88sQYMs_LeMmv5Aws03pM";
    const SUPABASE_TABLE = "lotto_draws";
    const MAX_HISTORY = 5;
    const OFFICIAL_PAGE_SIZE = 20;
    const storageKey = "lotto-history";
    let records = loadHistory();
    let archiveSource = Array.isArray(window.LOTTO_HISTORY) ? [...window.LOTTO_HISTORY].sort((a, b) => b.round - a.round) : [];
    let archiveView = archiveSource;
    let archiveLimit = OFFICIAL_PAGE_SIZE;
    const supabase = createClient && SUPABASE_URL && SUPABASE_ANON_KEY
      ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    function loadHistory() {
      try {
        const raw = localStorage.getItem(storageKey);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveHistory() {
      localStorage.setItem(storageKey, JSON.stringify(records));
    }

    function trackAnalyticsEvent(eventName, params = {}) {
      if (typeof window.gtag !== "function") return;
      window.gtag("event", eventName, params);
    }

    function normalizeRecord(item) {
      return {
        main: Array.isArray(item.main) ? item.main : (Array.isArray(item.main_numbers) ? item.main_numbers : []),
        bonus: Number(item.bonus ?? item.bonus_number ?? 0),
        stamp: item.stamp || item.created_at || ""
      };
    }

    function formatStamp(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("ko-KR", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    async function loadRemoteHistory() {
      if (!supabase) return [];

      const { data, error } = await supabase
        .from(SUPABASE_TABLE)
        .select("main_numbers, bonus_number, created_at")
        .order("created_at", { ascending: false })
        .limit(MAX_HISTORY);

      if (error) {
        console.warn("Supabase history load failed:", error.message);
        return [];
      }

      return (data || []).map((item) => ({
        main: item.main_numbers || [],
        bonus: item.bonus_number,
        stamp: formatStamp(item.created_at)
      }));
    }

    async function persistDraw(record) {
      if (!supabase) return;

      const { error } = await supabase
        .from(SUPABASE_TABLE)
        .insert([{
          main_numbers: record.main,
          bonus_number: record.bonus,
        }]);

      if (error) {
        console.warn("Supabase insert failed:", error.message);
      }
    }

    function randomSet(count, min, max) {
      const nums = new Set();
      while (nums.size < count) {
        nums.add(Math.floor(Math.random() * (max - min + 1)) + min);
      }
      return [...nums].sort((a, b) => a - b);
    }

    function renderBalls(numbers, containerClass = "ball") {
      return numbers.map((n, index) => {
        const delay = index * 70;
        return `<div class="${containerClass}" style="animation-delay:${delay}ms">${n}</div>`;
      }).join("");
    }

    function renderMiniBalls(numbers) {
      return numbers.map((n) => `<span class="mini-ball">${n}</span>`).join("");
    }

    function formatDrawDate(value) {
      if (!value || value.length !== 8) return "";
      return `${value.slice(0, 4)}.${value.slice(4, 6)}.${value.slice(6, 8)}`;
    }

    function renderOfficialHistory() {
      if (!archiveView.length) {
        officialHistory.innerHTML = '<div class="empty">검색 결과가 없습니다.</div>';
        return;
      }

      const visible = archiveView.slice(0, archiveLimit);
      officialHistory.innerHTML = visible.map((item) => `
        <div class="history-item official-item">
          <div>
            <strong>${item.round}회</strong>
            <small>${formatDrawDate(item.date)}</small>
          </div>
          <div class="history-balls">
            ${renderMiniBalls(item.numbers)}
            <span class="mini-ball bonus-chip" title="보너스">+${item.bonus}</span>
          </div>
        </div>
      `).join("");

      if (archiveLimit >= archiveView.length) {
        moreBtn.textContent = "끝까지 봤어요";
        moreBtn.disabled = true;
        moreBtn.style.opacity = "0.6";
      } else {
        moreBtn.textContent = "더 보기";
        moreBtn.disabled = false;
        moreBtn.style.opacity = "";
      }
    }

    function showLatestArchive() {
      archiveView = archiveSource;
      archiveLimit = OFFICIAL_PAGE_SIZE;
      roundInput.value = "";
      renderOfficialHistory();
    }

    function loadMoreArchive() {
      archiveLimit = Math.min(archiveLimit + OFFICIAL_PAGE_SIZE, archiveView.length);
      renderOfficialHistory();
    }

    function searchRound() {
      const target = Number(roundInput.value);
      if (!target) {
        showLatestArchive();
        return;
      }

      const found = archiveSource.find((item) => item.round === target);
      archiveView = found ? [found] : [];
      archiveLimit = OFFICIAL_PAGE_SIZE;
      renderOfficialHistory();
    }

    function drawLotto() {
      trackAnalyticsEvent("lotto_draw", {
        event_category: "engagement",
        event_label: "draw_button_click"
      });

      const main = randomSet(6, 1, 45);
      let bonus;
      do {
        bonus = randomSet(1, 1, 45)[0];
      } while (main.includes(bonus));

      result.innerHTML = renderBalls(main);
      bonusValue.textContent = bonus;
      bonusInfo.hidden = false;

      const stamp = new Date().toLocaleString("ko-KR", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });

      records.unshift({ main, bonus, stamp });
      records = records.slice(0, MAX_HISTORY);
      saveHistory();
      renderHistory();
      persistDraw({ main, bonus, stamp }).catch((error) => {
        console.warn("Supabase insert failed:", error);
      });
    }

    function renderHistory() {
      if (!records.length) {
        history.innerHTML = '<div class="empty">아직 추첨 기록이 없습니다.</div>';
        return;
      }

      history.innerHTML = records.map((item) => `
        <div class="history-item">
          <div>
            <strong>${item.stamp}</strong>
            <small>최근 추첨</small>
          </div>
          <div class="history-balls">
            ${renderMiniBalls(item.main)}
            <span class="mini-ball" title="보너스">+${item.bonus}</span>
          </div>
        </div>
      `).join("");
    }

    function clearHistory() {
      records = [];
      localStorage.removeItem(storageKey);
      result.innerHTML = '<div class="empty strong">번호를 추첨하려면 버튼을 눌러주세요</div>';
      bonusInfo.hidden = true;
      renderHistory();
    }

    drawBtn.addEventListener("click", drawLotto);
    clearBtn.addEventListener("click", clearHistory);
    roundSearchBtn.addEventListener("click", searchRound);
    latestBtn.addEventListener("click", showLatestArchive);
    moreBtn.addEventListener("click", loadMoreArchive);
    roundInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        searchRound();
      }
    });

    const bootstrap = async () => {
      const remoteHistory = await loadRemoteHistory();
      if (remoteHistory.length) {
        records = remoteHistory;
        saveHistory();
      }

      renderHistory();
      renderOfficialHistory();
    };

    bootstrap();
  </script>
</body>
</html>
